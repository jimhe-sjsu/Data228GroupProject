# ─────────────────────────────────────────────────────────────
# NYC Taxi Data Cleaning Pipeline — Configuration
# ─────────────────────────────────────────────────────────────

# Balanced tuning for MacBook M3 16GB / Docker 8GB
# local[4]: driver IS executor — avoids dual-executor OOM in constrained Docker
spark:
  master: "local[1]"
  driver_memory: "2500m"
  shuffle_partitions: 12
  default_parallelism: 12

hdfs:
  input_paths:
    - "hdfs://namenode:9000/user/data/nyc_taxi/raw/yellow_taxi/yellow_tripdata_2023-*.parquet"
    - "hdfs://namenode:9000/user/data/nyc_taxi/raw/yellow_taxi/yellow_tripdata_2024-*.parquet"
    - "hdfs://namenode:9000/user/data/nyc_taxi/raw/yellow_taxi/yellow_tripdata_2025-*.parquet"
  output_path: "hdfs://namenode:9000/user/data/nyc_taxi/cleaned/yellow_taxi"
  partition_cols:
    - "pickup_month"

hvfhv:
  input_paths:
    - "hdfs://namenode:9000/user/data/nyc_taxi/raw/hvfhv/fhvhv_tripdata_2023-*.parquet"
    - "hdfs://namenode:9000/user/data/nyc_taxi/raw/hvfhv/fhvhv_tripdata_2024-*.parquet"
    - "hdfs://namenode:9000/user/data/nyc_taxi/raw/hvfhv/fhvhv_tripdata_2025-*.parquet"
  output_path: "hdfs://namenode:9000/user/data/nyc_taxi/cleaned/fhvhv"
  cleaning_report_path: "/workspace/docs/hvfhv_cleaning_report.md"
  valid_years:
    - 2023
    - 2024
    - 2025
  max_trip_miles: 100
  min_trip_seconds: 60
  max_trip_seconds: 10800
  min_base_passenger_fare: 0.01

mysql:
  host: "mysql"
  port: 3306
  database: "nyc_taxi"
  table: "nyc_taxi_cleaned"
  user: "root"
  password: "rootpassword"
  driver: "com.mysql.cj.jdbc.Driver"
  jdbc_jar_path: "/workspace/jars/mysql-connector-j-8.0.33.jar"

thresholds:
  max_trip_distance_miles: 100
  max_passenger_count: 6
  min_fare_amount: 0.01
  max_trip_duration_hours: 3
  valid_years:
    - 2023
    - 2024
    - 2025
  valid_vendor_ids:
    - 1
    - 2
  valid_ratecode_ids:
    - 1
    - 2
    - 3
    - 4
    - 5
    - 6
    - 99
  valid_payment_types:
    - 1
    - 2
    - 3
    - 4
    - 5
    - 6

charts:
  output_dir: "/workspace/docs/charts/"

cleaning_report:
  output_path: "/workspace/docs/cleaning_report.md"
