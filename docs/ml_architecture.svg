<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="1720" viewBox="0 0 1100 1720" role="img" aria-labelledby="title desc">
  <title id="title">NYC Taxi Demand Prediction Architecture</title>
  <desc id="desc">Vertical architecture diagram for NYC TLC taxi demand prediction with Spark, Iceberg, ML models, DuckDB, Streamlit, map visualization, and LLM agent.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#566b78"/>
    </marker>
    <style>
      .title { font: 700 30px Arial, Helvetica, sans-serif; fill: #17222a; }
      .subtitle { font: 400 17px Arial, Helvetica, sans-serif; fill: #40515b; }
      .box-title { font: 700 17px Arial, Helvetica, sans-serif; fill: #17222a; }
      .box-text { font: 400 15px Arial, Helvetica, sans-serif; fill: #17222a; }
      .small-text { font: 400 13px Arial, Helvetica, sans-serif; fill: #17222a; }
      .edge { stroke: #566b78; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .source { fill: #e9f3fa; stroke: #315166; stroke-width: 2; }
      .process { fill: #edf7ee; stroke: #315166; stroke-width: 2; }
      .model { fill: #fff2d6; stroke: #315166; stroke-width: 2; }
      .app { fill: #f3eafa; stroke: #315166; stroke-width: 2; }
    </style>
  </defs>

  <rect width="1100" height="1720" fill="#ffffff"/>
  <text x="550" y="58" text-anchor="middle" class="title">NYC Taxi Demand Prediction Architecture</text>
  <text x="550" y="88" text-anchor="middle" class="subtitle">ML-focused pipeline for predicting demand by pickup location and hour</text>

  <!-- Main vertical pipeline -->
  <g id="main-pipeline">
    <rect x="370" y="125" width="360" height="74" rx="10" class="source"/>
    <text x="550" y="151" text-anchor="middle" class="box-title">NYC TLC Raw Data</text>
    <text x="550" y="174" text-anchor="middle" class="box-text">Yellow Taxi + HVFHV</text>
    <text x="550" y="193" text-anchor="middle" class="small-text">2023-2025 monthly parquet files</text>

    <line x1="550" y1="199" x2="550" y2="233" class="edge"/>

    <rect x="370" y="235" width="360" height="74" rx="10" class="process"/>
    <text x="550" y="263" text-anchor="middle" class="box-title">Raw Data Ingestion</text>
    <text x="550" y="287" text-anchor="middle" class="box-text">Download monthly parquet files</text>

    <line x1="550" y1="309" x2="550" y2="343" class="edge"/>

    <rect x="370" y="345" width="360" height="74" rx="10" class="source"/>
    <text x="550" y="373" text-anchor="middle" class="box-title">HDFS Raw Zone</text>
    <text x="550" y="397" text-anchor="middle" class="box-text">yellow_taxi + hvfhv raw parquet</text>

    <line x1="550" y1="419" x2="550" y2="453" class="edge"/>

    <rect x="370" y="455" width="360" height="82" rx="10" class="process"/>
    <text x="550" y="483" text-anchor="middle" class="box-title">Spark Cleaning Pipelines</text>
    <text x="550" y="507" text-anchor="middle" class="box-text">Separate cleaning for Yellow Taxi</text>
    <text x="550" y="526" text-anchor="middle" class="box-text">and HVFHV</text>

    <line x1="550" y1="537" x2="550" y2="571" class="edge"/>

    <rect x="340" y="573" width="420" height="94" rx="10" class="process"/>
    <text x="550" y="601" text-anchor="middle" class="box-title">Shared Standardized Format</text>
    <text x="550" y="625" text-anchor="middle" class="box-text">pickup time, pickup zone, dropoff zone</text>
    <text x="550" y="646" text-anchor="middle" class="box-text">duration, miles, speed, source</text>

    <line x1="550" y1="667" x2="550" y2="701" class="edge"/>

    <rect x="370" y="703" width="360" height="74" rx="10" class="source"/>
    <text x="550" y="731" text-anchor="middle" class="box-title">Cleaned Parquet Zone</text>
    <text x="550" y="755" text-anchor="middle" class="box-text">Standardized monthly parquet outputs</text>

    <line x1="550" y1="777" x2="550" y2="811" class="edge"/>

    <rect x="370" y="813" width="360" height="74" rx="10" class="process"/>
    <text x="550" y="853" text-anchor="middle" class="box-title">Aggregation Layer</text>
  </g>

  <!-- EDA and ML branch -->
  <line x1="550" y1="887" x2="260" y2="935" class="edge"/>
  <line x1="550" y1="887" x2="840" y2="935" class="edge"/>

  <rect x="90" y="937" width="340" height="92" rx="10" class="source"/>
  <text x="260" y="965" text-anchor="middle" class="box-title">Iceberg EDA Tables</text>
  <text x="260" y="989" text-anchor="middle" class="box-text">hourly demand, borough demand</text>
  <text x="260" y="1010" text-anchor="middle" class="box-text">top zones, trip metrics</text>

  <rect x="670" y="937" width="340" height="92" rx="10" class="source"/>
  <text x="840" y="965" text-anchor="middle" class="box-title">Iceberg ML Table</text>
  <text x="840" y="989" text-anchor="middle" class="box-text">One row per pickup location and hour</text>
  <text x="840" y="1010" text-anchor="middle" class="box-text">Target: trip_count</text>

  <!-- ML path -->
  <line x1="840" y1="1029" x2="840" y2="1063" class="edge"/>

  <rect x="670" y="1065" width="340" height="74" rx="10" class="model"/>
  <text x="840" y="1093" text-anchor="middle" class="box-title">ML Training and Evaluation</text>
  <text x="840" y="1117" text-anchor="middle" class="box-text">Train/test split and metrics</text>

  <line x1="840" y1="1139" x2="840" y2="1173" class="edge"/>

  <rect x="650" y="1175" width="380" height="94" rx="10" class="model"/>
  <text x="840" y="1203" text-anchor="middle" class="box-title">Model Comparison</text>
  <text x="840" y="1227" text-anchor="middle" class="box-text">XGBoost, Random Forest</text>
  <text x="840" y="1248" text-anchor="middle" class="box-text">Gradient Boosting or Linear Baseline</text>

  <line x1="840" y1="1269" x2="840" y2="1303" class="edge"/>

  <rect x="670" y="1305" width="340" height="82" rx="10" class="model"/>
  <text x="840" y="1333" text-anchor="middle" class="box-title">Parameter Testing</text>
  <text x="840" y="1357" text-anchor="middle" class="box-text">Tune model settings</text>
  <text x="840" y="1376" text-anchor="middle" class="box-text">Compare RMSE, MAE, R2</text>

  <line x1="840" y1="1387" x2="840" y2="1421" class="edge"/>

  <rect x="670" y="1423" width="340" height="74" rx="10" class="model"/>
  <text x="840" y="1451" text-anchor="middle" class="box-title">Best Demand Prediction Model</text>
  <text x="840" y="1475" text-anchor="middle" class="box-text">Predicts demand by zone and time</text>

  <line x1="840" y1="1497" x2="840" y2="1531" class="edge"/>

  <rect x="620" y="1533" width="440" height="82" rx="10" class="model"/>
  <text x="840" y="1561" text-anchor="middle" class="box-title">Precomputed Current Predictions</text>
  <text x="840" y="1585" text-anchor="middle" class="box-text">Predicted demand by zone for</text>
  <text x="840" y="1604" text-anchor="middle" class="box-text">selected/current time</text>

  <line x1="840" y1="1615" x2="840" y2="1649" class="edge"/>

  <rect x="670" y="1651" width="340" height="58" rx="10" class="app"/>
  <text x="840" y="1674" text-anchor="middle" class="box-title">DuckDB Serving Table</text>
  <text x="840" y="1696" text-anchor="middle" class="box-text">Small local table for app queries</text>

  <!-- App continuation drawn in side panel to keep height manageable -->
  <g transform="translate(90 1128)">
    <rect x="0" y="0" width="340" height="72" rx="10" class="app"/>
    <text x="170" y="29" text-anchor="middle" class="box-title">Streamlit Demo App</text>
    <text x="170" y="53" text-anchor="middle" class="box-text">Reads DuckDB + EDA tables</text>

    <line x1="170" y1="72" x2="170" y2="106" class="edge"/>
    <rect x="0" y="108" width="340" height="82" rx="10" class="app"/>
    <text x="170" y="136" text-anchor="middle" class="box-title">NYC Map Visualization</text>
    <text x="170" y="160" text-anchor="middle" class="box-text">User enters hour/time</text>
    <text x="170" y="179" text-anchor="middle" class="box-text">Zones are color-coded by demand</text>

    <line x1="170" y1="190" x2="170" y2="224" class="edge"/>
    <rect x="0" y="226" width="340" height="82" rx="10" class="app"/>
    <text x="170" y="254" text-anchor="middle" class="box-title">LLM Agent</text>
    <text x="170" y="278" text-anchor="middle" class="box-text">Reads DuckDB current predictions</text>
    <text x="170" y="297" text-anchor="middle" class="box-text">Answers busiest/high-demand questions</text>
  </g>

  <line x1="260" y1="1029" x2="260" y2="1126" class="edge"/>
  <path d="M 670 1680 C 560 1680, 445 1220, 430 1164" class="edge"/>

  <!-- Legend -->
  <g transform="translate(90 1530)">
    <text x="0" y="0" class="box-title">Legend</text>
    <rect x="0" y="20" width="22" height="18" rx="3" class="source"/>
    <text x="34" y="35" class="small-text">Storage / data tables</text>
    <rect x="0" y="52" width="22" height="18" rx="3" class="process"/>
    <text x="34" y="67" class="small-text">Spark pipeline process</text>
    <rect x="0" y="84" width="22" height="18" rx="3" class="model"/>
    <text x="34" y="99" class="small-text">Modeling step</text>
    <rect x="0" y="116" width="22" height="18" rx="3" class="app"/>
    <text x="34" y="131" class="small-text">Serving / demo layer</text>
  </g>
</svg>
