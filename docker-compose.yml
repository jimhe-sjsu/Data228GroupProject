services:
  # ─────────────────────────────────────────────────────────────
  # HADOOP CLUSTER
  # ─────────────────────────────────────────────────────────────
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - "9871:9870"
      - "9000:9000"
    environment:
      CLUSTER_NAME: data228
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
    env_file:
      - ./config/hadoop.env
    volumes:
      - ./data/namenode:/hadoop/dfs/name

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    platform: linux/amd64
    restart: unless-stopped
    depends_on:
      - namenode
    ports:
      - "9865:9864"
      - "9866:9866"
    environment:
      SERVICE_PRECONDITION: "namenode:9870"
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
      HDFS_CONF_dfs_datanode_hostname: datanode
      HDFS_CONF_dfs_datanode_address: 0.0.0.0:9866
    env_file:
      - ./config/hadoop.env
    volumes:
      - ./data/datanode:/hadoop/dfs/data

  resourcemanager:
    image: bde2020/hadoop-resourcemanager:2.0.0-hadoop3.2.1-java8
    platform: linux/amd64
    restart: unless-stopped
    depends_on:
      - namenode
      - datanode
    ports:
      - "8088:8088"
    environment:
      SERVICE_PRECONDITION: "namenode:9000 namenode:9870 datanode:9864"
      YARN_CONF_yarn_resourcemanager_hostname: resourcemanager
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
    env_file:
      - ./config/hadoop.env

  nodemanager:
    image: bde2020/hadoop-nodemanager:2.0.0-hadoop3.2.1-java8
    platform: linux/amd64
    restart: unless-stopped
    depends_on:
      - resourcemanager
    ports:
      - "8042:8042"
    environment:
      SERVICE_PRECONDITION: "namenode:9000 namenode:9870 datanode:9864 resourcemanager:8088"
      YARN_CONF_yarn_resourcemanager_hostname: resourcemanager
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
    env_file:
      - ./config/hadoop.env

  historyserver:
    image: bde2020/hadoop-historyserver:2.0.0-hadoop3.2.1-java8
    platform: linux/amd64
    restart: unless-stopped
    depends_on:
      - resourcemanager
    ports:
      - "8188:8188"
    environment:
      SERVICE_PRECONDITION: "namenode:9000 namenode:9870 datanode:9864 resourcemanager:8088"
    env_file:
      - ./config/hadoop.env
    volumes:
      - ./data/historyserver:/hadoop/yarn/timeline

  # ─────────────────────────────────────────────────────────────
  # SPARK CLUSTER
  # ─────────────────────────────────────────────────────────────
  spark-master:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile
      args:
        SPARK_BASE_IMAGE: apache/spark:3.5.3
    image: data228-spark:3.5.3-python
    restart: unless-stopped
    depends_on:
      - namenode
      - datanode
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master", "--host", "spark-master"]
    ports:
      - "8180:8080"
      - "7077:7077"
      - "8888:8888"
    environment:
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
    volumes:
      - ./:/workspace
    working_dir: /workspace

  spark-worker:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile
      args:
        SPARK_BASE_IMAGE: apache/spark:3.5.3
    image: data228-spark:3.5.3-python
    restart: unless-stopped
    depends_on:
      - spark-master
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    ports:
      - "8082:8081"
    environment:
      SPARK_MASTER: spark://spark-master:7077
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
    volumes:
      - ./:/workspace
    working_dir: /workspace

  # ─────────────────────────────────────────────────────────────
  # MYSQL (Serving Layer)
  # ─────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    env_file:
      - ./config/mysql.env
    ports:
      - "3340:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
  
  jupyter:
    image: jupyter/pyspark-notebook:latest
    container_name: spark_jupyter
    ports:
      - "8890:8888"
    volumes:
      - ./notebooks:/home/jovyan/work
    environment:
      - JUPYTER_TOKEN=dev

  # ─────────────────────────────────────────────────────────────
  # AIRFLOW (Orchestration)
  # ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    image: data228-airflow:2.9.3-docker
    platform: linux/amd64
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./config/airflow.env
    entrypoint: >
      bash -c "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@data228.local || true"
    restart: "no"

  airflow-webserver:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    image: data228-airflow:2.9.3-docker
    platform: linux/amd64
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    env_file:
      - ./config/airflow.env
    ports:
      - "8085:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./jobs:/opt/airflow/jobs
      - ./config:/opt/airflow/config
      - ./logs/airflow:/opt/airflow/logs
    command: airflow webserver

  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    image: data228-airflow:2.9.3-docker
    platform: linux/amd64
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    env_file:
      - ./config/airflow.env
    # Run as root so the scheduler can access the Docker socket
    # to execute `docker exec` commands on the spark-master container.
    user: root
    volumes:
      - ./dags:/opt/airflow/dags
      - ./jobs:/opt/airflow/jobs
      - ./config:/opt/airflow/config
      - ./logs/airflow:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock
    command: airflow scheduler
